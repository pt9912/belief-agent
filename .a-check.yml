# .a-check.yml — Architektur-Regeln (a-check, ADR-0001/ADR-0003 HexSlice).
# Rollen leiten sich aus den Namen ab: domain (importiert nur sich selbst),
# application (nutzt domain + port), adapter (implementiert Ports).
#
# KMP/Multi-Modul (a-check v0.11.0): fixed-root mit geteiltem package_base
# `dev.beliefagent` und je Modul einem Root. Der interne FQN wird
# **datei-mengen-bewusst gegen die REALEN Dateien unter roots** aufgelöst (nicht
# am Wurzel-Präfix) — disjunkte Sub-Namespaces (`dev.beliefagent.domain.*` vs.
# `dev.beliefagent.application.*`) sind damit eindeutig und werden **echt
# durchgesetzt** (negativ-getestet: `domain→application` = 1 Befund). Nur
# gleicher FQN real in >=2 roots verschiedener Schichten ⇒ Exit 2. Adapter-Roots
# folgen (slice-009/010) demselben Muster.
version: 1

languages:
  kotlin: ["**/*.kt"]

layers:
  domain: ["hexagon/domain/**"]
  application: ["hexagon/application/**"]
  inbound_cli: ["adapters/inbound/cli/**"]
  outbound_llm_fake: ["adapters/outbound/llm-fake/**"]
  outbound_llm_langchain4j: ["adapters/outbound/llm-langchain4j/**"]
  outbound_llm_koog: ["adapters/outbound/llm-koog/**"]
  outbound_observation_fake: ["adapters/outbound/observation-fake/**"]
  outbound_observation_build_report: ["adapters/outbound/observation-build-report/**"]
  outbound_observation_git_local: ["adapters/outbound/observation-git-local/**"]
  outbound_audit_memory: ["adapters/outbound/audit-memory/**"]
  outbound_audit_file: ["adapters/outbound/audit-file/**"]
  outbound_approval_fake: ["adapters/outbound/approval-fake/**"]
  outbound_approval_local: ["adapters/outbound/approval-local/**"]
  outbound_approval_remote_ui: ["adapters/outbound/approval-remote-ui/**"]
  outbound_voi_fake: ["adapters/outbound/voi-fake/**"]
  outbound_llm_hypothesen_fake: ["adapters/outbound/llm-hypothesen-fake/**"]
  outbound_konfidenz_memory: ["adapters/outbound/konfidenz-memory/**"]
  outbound_llm_action_fake: ["adapters/outbound/llm-action-fake/**"]
  outbound_llm_action_langchain4j: ["adapters/outbound/llm-action-langchain4j/**"]
  examples: ["example/**"]

edges:
  - {from: application, to: domain} # Use-Case nutzt die Domaene
  - {from: outbound_llm_fake, to: application}
  - {from: outbound_llm_fake, to: domain}
  - {from: outbound_llm_langchain4j, to: application}
  - {from: outbound_llm_langchain4j, to: domain}
  - {from: outbound_llm_koog, to: application}
  - {from: outbound_llm_koog, to: domain}
  - {from: outbound_observation_fake, to: application}
  - {from: outbound_observation_fake, to: domain}
  - {from: outbound_observation_build_report, to: application}
  - {from: outbound_observation_build_report, to: domain}
  - {from: outbound_observation_git_local, to: application}
  - {from: outbound_observation_git_local, to: domain}
  - {from: outbound_audit_memory, to: application}
  - {from: outbound_audit_memory, to: domain}
  - {from: outbound_audit_file, to: application}
  - {from: outbound_audit_file, to: domain}
  - {from: outbound_approval_fake, to: application}
  - {from: outbound_approval_fake, to: domain}
  - {from: outbound_approval_local, to: application}
  - {from: outbound_approval_local, to: domain}
  - {from: outbound_approval_remote_ui, to: application}
  - {from: outbound_approval_remote_ui, to: domain}
  - {from: outbound_voi_fake, to: application}
  - {from: outbound_voi_fake, to: domain}
  - {from: outbound_llm_hypothesen_fake, to: application}
  - {from: outbound_llm_hypothesen_fake, to: domain}
  - {from: outbound_konfidenz_memory, to: application}
  - {from: outbound_llm_action_fake, to: application}
  - {from: outbound_llm_action_fake, to: domain}
  - {from: outbound_llm_action_langchain4j, to: application}
  - {from: outbound_llm_action_langchain4j, to: domain}
  - {from: inbound_cli, to: application} # Composition Root ruft Use Cases auf
  - {from: inbound_cli, to: domain}      # CLI baut deterministische Szenario-Werte
  - {from: inbound_cli, to: outbound_llm_fake}
  - {from: inbound_cli, to: outbound_observation_fake}
  - {from: inbound_cli, to: outbound_audit_memory}
  - {from: inbound_cli, to: outbound_approval_fake}
  - {from: inbound_cli, to: outbound_approval_local}
  - {from: inbound_cli, to: outbound_approval_remote_ui}
  - {from: inbound_cli, to: outbound_voi_fake}
  - {from: inbound_cli, to: outbound_llm_hypothesen_fake}
  - {from: inbound_cli, to: outbound_konfidenz_memory}
  - {from: inbound_cli, to: outbound_llm_action_fake}
  - {from: examples, to: application} # Beispiele verdrahten Use Cases/Ports, gehoeren nicht zum Core
  - {from: examples, to: domain}      # Beispiele bauen Domaenenwerte fuer demonstrative Runs
  - {from: examples, to: outbound_llm_fake}
  - {from: examples, to: outbound_llm_langchain4j}
  - {from: examples, to: outbound_llm_koog}
  - {from: examples, to: outbound_observation_fake}
  - {from: examples, to: outbound_audit_memory}
  - {from: examples, to: outbound_approval_fake}
  - {from: examples, to: outbound_voi_fake}
  - {from: examples, to: outbound_llm_hypothesen_fake}
  - {from: examples, to: outbound_konfidenz_memory}
  - {from: examples, to: outbound_llm_action_fake}
  - {from: examples, to: outbound_observation_build_report}
  - {from: examples, to: outbound_observation_git_local}

resolution:
  kotlin:
    mode: fixed-root
    package_base: "dev.beliefagent"
    roots:
      - "hexagon/domain/src/commonMain/kotlin/dev/beliefagent"
      - "hexagon/application/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/llm-fake/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/llm-langchain4j/src/main/kotlin/dev/beliefagent"
      - "adapters/outbound/llm-koog/src/main/kotlin/dev/beliefagent"
      - "adapters/outbound/observation-fake/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/observation-build-report/src/main/kotlin/dev/beliefagent"
      - "adapters/outbound/observation-git-local/src/main/kotlin/dev/beliefagent"
      - "adapters/outbound/audit-memory/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/audit-file/src/main/kotlin/dev/beliefagent"
      - "adapters/outbound/approval-fake/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/approval-local/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/approval-remote-ui/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/voi-fake/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/llm-hypothesen-fake/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/konfidenz-memory/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/llm-action-fake/src/commonMain/kotlin/dev/beliefagent"
      - "adapters/outbound/llm-action-langchain4j/src/main/kotlin/dev/beliefagent"
      - "adapters/inbound/cli/src/main/kotlin/dev/beliefagent"
      - "example/langchain/src/main/kotlin/dev/beliefagent"
      - "example/koog/src/main/kotlin/dev/beliefagent"
      - "example/code-agent/src/main/kotlin/dev/beliefagent"

# Framework/DI gehören nur an den Adapter-Rand (ADR-0001/0003). Ein Import im
# Kern (domain/application) ist ein tech-leak — greift auch schon bei einem
# einzelnen Modul (Roh-Symbol, ohne resolution).
tech:
  - {pattern: "org.koin", adapter: "adapters/inbound/cli"} # DI (ADR-0002) nur im ARC-09-Composition-Root
  - {pattern: "io.micronaut", adapter: "adapters/inbound/cli"}
  - {pattern: "io.ktor", adapter: "adapters/inbound/cli"}

# Test-Quellen aus dem Arch-Scan ausnehmen (nur Produktivimporte prüfen).
exclude: ["**/src/*Test/**", "**/src/test/**"]
